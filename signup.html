<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wheeze — Sign Up</title>
  <link rel="stylesheet" href="css/wheeze.css">
  <script src="js/toast.js"></script>
  <script src="js/theme.js"></script>
</head>
<body>

  <nav class="navbar">
    <a href="wheeze.html" class="logo">Wheeze</a>
    <div class="nav-actions">
      <button id="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-container">
      <h2>Create account</h2>

      <form id="signup-form">
        <div class="auth-field">
          <label>Username</label>
          <input type="text" id="new-username" placeholder="Pick a username" required>
        </div>
        <div class="auth-field">
          <label>Email Address</label>
          <input type="email" id="new-email" placeholder="you@example.com" required>
        </div>
        <div class="auth-field">
          <label>Password</label>
          <input type="password" id="new-password" placeholder="At least 6 characters" required>
        </div>
        <button type="submit" class="auth-submit">Sign Up</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Login here</a>
      </div>
      <a href="wheeze.html" class="auth-back">← Back to Home</a>
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
