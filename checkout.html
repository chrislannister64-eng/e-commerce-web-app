<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wheeze — Checkout</title>
  <link rel="stylesheet" href="css/wheeze.css">
  <script src="js/toast.js"></script>
  <script src="js/theme.js"></script>
  <!-- Paystack inline script -->
  <script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body>

  <nav class="navbar">
    <a href="wheeze.html" class="logo">Wheeze</a>
    <ul class="nav-links">
      <li><a href="wheeze.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
    </ul>
    <div class="nav-actions">
      <button id="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>
    </div>
  </nav>

  <main class="checkout-page">
    <h1>Checkout</h1>
    <div class="checkout-container">

      <section class="order-summary">
        <h2>Order Summary</h2>
        <div id="checkout-items"></div>
        <h3 id="checkout-total" style="margin-top:20px">Total: ₦0</h3>
      </section>

      <section class="customer-details">
        <h2>Your Details</h2>
        <div class="checkout-field">
          <label>Full Name</label>
          <input type="text" id="customer-name" placeholder="John Doe">
        </div>
        <div class="checkout-field">
          <label>Email Address</label>
          <input type="email" id="customer-email" placeholder="john@example.com">
        </div>
        <div class="checkout-field">
          <label>Delivery Address</label>
          <input type="text" id="customer-address" placeholder="123 Main St, Lagos">
        </div>
        <button class="pay-btn" onclick="payNow()">Pay with Paystack →</button>
      </section>

    </div>
  </main>

  <script type="module" src="js/checkout.js"></script>
</body>
</html>
